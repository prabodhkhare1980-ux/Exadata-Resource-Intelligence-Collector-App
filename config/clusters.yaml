environments:
  onprem:
    description: On-premises Exadata estate
    ssh_user: al44002
    auth:
      method: password
      sudo: true
      sudo_password: same_as_ssh
  oci:
    description: OCI Exadata estate
    ssh_user: AN697937AD
    auth:
      method: password
      sudo: true
      sudo_password: same_as_ssh

clusters:
  - name: onprem-rac01
    environment: onprem
    hosts:
      - name: onprem-rac01-db01
        address: dc04dx26db01.internal.das
      - name: onprem-rac01-db02
        address: dc04dx26db02.internal.das
  - name: oci-vmcluster01
    environment: oci
    # Optional cluster-level override when needed
    # ssh_user: SOME_CLUSTER_OVERRIDE
    hosts:
      - name: oci-vmcluster01-db01
        address: 10.0.0.11
      - name: oci-vmcluster01-db02
        address: 10.0.0.12
        # Optional host-level override when needed
        # ssh_user: SOME_HOST_OVERRIDE

collection:
  output_dir: output
  ssh:
    port: 22
    timeout_seconds: 60
    strict_host_key_checking: accept-new
