environments:
  onprem:
    description: On-premises Exadata estate
    ssh_user: your_onprem_personal_id
    auth:
      method: password
      sudo: true
      sudo_password: same_as_ssh
  oci:
    description: OCI Exadata estate
    ssh_user: your_oci_personal_id
    auth:
      method: password
      sudo: true
      sudo_password: same_as_ssh

clusters:
  - name: onprem-rac01
    environment: onprem
    hosts:
      - name: onprem-rac01-db01
        address: onprem-rac01-db01.example.com
      - name: onprem-rac01-db02
        address: onprem-rac01-db02.example.com
  - name: oci-vmcluster01
    environment: oci
    ssh_user: cluster_specific_oci_id
    hosts:
      - name: oci-vmcluster01-db01
        address: 10.0.0.11
      - name: oci-vmcluster01-db02
        address: 10.0.0.12
        ssh_user: host_specific_override_id

collection:
  output_dir: output
  ssh:
    port: 22
    timeout_seconds: 60
    strict_host_key_checking: accept-new
# Sample Phase 1 inventory for Exadata Resource Intelligence Collector.
# Update host names, addresses, user, and SSH options for your environment.

defaults:
  user: oracle
  port: 22
  sudo: true
  timeout_seconds: 60
  output_dir: output
  logs_dir: logs
  ssh_options:
    - StrictHostKeyChecking=accept-new
    - ServerAliveInterval=15
    - ServerAliveCountMax=2

clusters:
  - name: exadata_cluster_01
    hosts:
      - name: dbnode01
        address: dbnode01.example.com
      - name: dbnode02
        address: dbnode02.example.com
        timeout_seconds: 90

  - name: rac_cluster_01
    hosts:
      - name: racnode01
        address: 192.0.2.10
        user: opc
        sudo: true
