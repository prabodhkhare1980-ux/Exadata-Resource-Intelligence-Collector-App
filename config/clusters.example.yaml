environments:
  onprem:
    description: On-premises Exadata estate
    ssh_user: srcordma
    auth:
      method: ssh_key
      private_key: .secrets/ssh/srcordma_id_rsa
    privilege:
      enabled: true
      method: sudo
      sudo_password: none
      force_tty: true

  oci:
    description: OCI Exadata estate
    ssh_user: srcordma
    auth:
      method: ssh_key
      private_key: .secrets/ssh/srcordma_id_rsa
    privilege:
      enabled: true
      method: sudo
      sudo_password: none
      force_tty: true

clusters:
  - name: onprem-rac01
    environment: onprem
    hosts:
      - name: dc04dx26db01
        address: onprem-db01.example.internal
      - name: dc04dx26db02
        address: onprem-db02.example.internal

  - name: iad3dx02v1-6rdqa1
    environment: oci
    hosts:
      - name: iad3dx02v1-6rdqa1
        address: oci-db01.example.internal

collection:
  output_dir: output
  asm:
    enabled: true
    timeout_seconds: 30
  ssh:
    port: 22
    timeout_seconds: 120
    strict_host_key_checking: accept-new

  parallel:
    enabled: true
    max_clusters: 3
    max_hosts_per_cluster: 2
