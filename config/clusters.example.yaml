environments:
  onprem:
    description: On-premises Exadata estate
    ssh_user: srcordma
    auth:
      method: ssh_key
      private_key: .secrets/ssh/srcordma_id_rsa
    privilege:
      enabled: true
      method: sudo
      sudo_password: none
      force_tty: true
    # On-prem cells: use `dcli -g` only with a proper one-host-per-line cell
    # group file; cellip.ora (cell="ip;ip" lines) is parsed into one cell per
    # line and reached by direct SSH (sudo -n ssh <user>@<cell>) to one of its
    # redundant IPs. Try root first (many on-prem cells deny celladmin).
    cell_access:
      method: dcli_or_direct
      users:
        - root
        - celladmin
      direct_ssh_use_sudo: true

  oci:
    description: OCI Exadata estate
    ssh_user: srcordma
    auth:
      method: ssh_key
      private_key: .secrets/ssh/srcordma_id_rsa
    privilege:
      enabled: true
      method: sudo
      sudo_password: none
      force_tty: true
    # OCI ExaCS: reach cells with ExaCLI from the DB VM using the
    # cloud_user_<clustername> storage user and cellip.ora.
    # cookie_refresh: when the ExaCLI cookie is missing or expired (24h on
    # ExaCS) the collector runs `password_command` ON THE DB VM, pipes its
    # stdout into `exacli ... --cookie-jar` to mint a fresh cookie, and
    # retries. The password never enters this app's process or argv.
    cell_access:
      method: exacli
      exacli_user_template: cloud_user_{cluster_name}
      cell_ip_file: /etc/oracle/cell/network-config/cellip.ora
      use_cookie_jar: true
      no_prompt: true
      cookie_refresh: true
      # Replace this with the command Oracle provides on your DB VM (or your
      # own wrapper script) that prints the cloud_user password to stdout.
      # The collector executes it on the DB VM only when the cookie has
      # expired, never writes it anywhere, and never logs it.
      password_command: /var/opt/oracle/exadbcs/getStorageCredential.sh

clusters:
  - name: onprem-rac01
    environment: onprem
    hosts:
      - name: dc04dx26db01
        address: onprem-db01.example.internal
      - name: dc04dx26db02
        address: onprem-db02.example.internal

  - name: iad3dx02v1-6rdqa1
    environment: oci
    hosts:
      - name: iad3dx02v1-6rdqa1
        address: oci-db01.example.internal

collection:
  output_dir: output
  asm:
    enabled: true
    timeout_seconds: 30
    include_debug: false
  hugepages:
    enabled: true
    timeout_seconds: 15
  # Uses DBA_HIST_* AWR views and requires Oracle Diagnostics Pack licensing.
  db_performance:
    enabled: true
    use_awr: true
    days_back: 7
    timeout_seconds: 90
    collect_cpu_iops: true
    collect_memory_history: true
  db_memory_history:
    warning_thresholds:
      sga_near_max_severity: info
      sga_near_max_pct: 98
      pga_used_pct_target: 80
      pga_alloc_pct_target: 100
  # License/capacity DB collection. Uses base catalog views (v$pdbs,
  # dba_feature_usage_statistics) and does NOT require Diagnostics Pack.
  db_capacity:
    enabled: true
    collect_pdb_inventory: true
    collect_feature_usage: true
    timeout_seconds: 90
  # Per-Oracle-home patch inventory via opatch lspatches (DB homes + Grid home).
  db_patch:
    enabled: true
    include_grid_home: true
    timeout_seconds: 60
  # AWR workload intensity (DB Time/CPU/AAS/redo) and tablespace growth.
  # Reads DBA_HIST_* views and requires Oracle Diagnostics Pack licensing.
  db_workload:
    enabled: true
    collect_workload: true
    collect_tablespace_growth: true
    timeout_seconds: 120
  # Exadata storage-cell inventory. The per-environment `cell_access` block
  # (above) selects the method (dcli_or_direct / direct_ssh / exacli); these
  # are the global defaults shared across environments.
  cell_inventory:
    enabled: true
    timeout_seconds: 45
    access_order:        # default user fallback when an env omits cell_access.users
      - celladmin
      - root
    cell_group_files:    # probed in order; first readable one wins
      - /root/cell_group
      - /root/cell_group_name
      - /etc/oracle/cell/network-config/cellip.ora
    allow_direct_cell_ssh: true
  debug:
    enabled: false
  ssh:
    port: 22
    # Inherited by hosts unless overridden; the code default is also 120 seconds.
    timeout_seconds: 120
    strict_host_key_checking: accept-new

  parallel:
    enabled: true
    max_clusters: 3
    max_hosts_per_cluster: 2
